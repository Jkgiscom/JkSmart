<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../js/jquery.json-viewer.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.css">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 99%;
            color: #888;
        }

        footer {
            display: block;
            position: fixed;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 50px;
            overflow-x: auto;
            box-sizing: border-box;
            border-top: 1px solid #ccc;
        }

        footer li {
            display: block;
            float: left;
            width: auto;
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
        }

        footer li.down {
            color: #555;
            font-size: 15px;
        }

        #page {
            display: block;
            width: 98%;
            height: calc(98% - 25px);
            border: 0px solid #eee;
            box-sizing: border-box;
            margin: 1%;
            overflow-y: auto;
        }

        #page pre {
            width: 100%;
            height: auto;
        }

        #page .folder {
            display: block;
            width: 100%;
            float: left;
            line-height: 35px;
            background-color: #fcfcfc;
            text-indent: 10px;
            margin: 0 0 10px 0;
        }

        #page .folder i {
            color: gold;
        }

        #page .files {
            display: block;
            width: 100%;
            height: auto;
        }

        #page .files .file {
            display: block;
            float: left;
            width: 100px;
            height: 100px;
            margin: 10px;
        }

        #page .files .file div {
            width: 100%;
            height: calc(100% - 20px);
            overflow: hidden;
            background-color: #fefefe;
            border-radius: 5px;
            margin: 0 0 5px 0;
        }

        #page .files .file div img {
            width: auto;
            height: 100%;
        }

        #page .files .file span {
            display: block;
            width: 100%;
            height: 20px;
            line-height: 12px;
            font-size: 12px;
            color: #555;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="page">
    </div>
</body>
<script src="../js/jquery-3.6.2.min.js"></script>
<script src="../js/request.js"></script>
<script src="../js/jquery.json-viewer.min.js"></script>

</html>
<script>
    window.onload = () => {
        const big_exts = {
            "doc": "doc128.png", "docx": "doc128.png", "xls": "xls2.png", "xlsx": "xls2.png",
            "pdf": "pdf256.png", "ppt": "ppt256.png", "pptx": "ppt256.png", "zip": "zip256.png", "rar": "zip256.png"
        };

        let path = request.getParameter("url");
        path = path.substring(0, path.lastIndexOf("."));
        console.log(path);
        let server = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
        console.log(server + path)
        webRoot = server + path;
        let datas = [];
        $.ajax(server + path + "/index.HTM", {
            type: 'GET',
            dataType: 'text', //服务器返回json格式数据
            timeout: 15000, //15秒超时
            success: function (rs) {
                console.log(eval(rs));
                datas = eval(rs);
                datas.sort()
                console.log(datas)
                let dir = [];
                let files = [];
                for (var i = 0; i < datas.length; i++) {
                    if (datas[i].endsWith("/")) {
                        dir.push(datas[i])
                    } else {
                        files.push(datas[i])
                    }
                }
                let path = request.getParameter("url");
                path = path.substring(0, path.lastIndexOf(".")) + "/";
                for (var i = 0; i < dir.length; i++) {
                    $("#page").append('<div class="folder"><i class="bi bi-folder-fill"></i> ' + dir[i] + '</div>')
                    let str = "";
                    for (let j = 0; j < files.length; j++) {
                        let p = files[j].substring(0, files[j].lastIndexOf("/") + 1);
                        console.log(p)
                        if (p == dir[i]) {
                            let f = files[j];
                            let ext = f.substring(f.lastIndexOf('.') + 1).toLowerCase();
                            let isPic = false;
                            if (ext == "jpg" || ext == "jpeg" || ext == "jpa" || ext == "png" || ext == "bmp" || ext == "tiff" || ext == "gif") {
                                isPic = true;
                            }
                            let fname = f.substring(f.lastIndexOf("/") + 1);
                            if (isPic) {
                                str += '<div class="file"><div><a href="./' + path + files[j] + '" target="_blank"><img src="./' + path + files[j] + '"></a></div><span>' + fname + '</span></div>';
                            } else {
                                let icon = big_exts[ext];
                                icon = icon == null ? "file256.png" : icon;
                                str += '<div class="file"><div><a href="./' + path + files[j] + '" target="_blank"><img src="../static/exts/' + icon + '"></a></div><span>' + fname + '</span></div>';
                            }
                        }
                    }
                    $("#page").append("<div class='files'>" + str + "</div>")
                }
                for (let j = 0; j < files.length; j++) {
                    if (files.indexOf("/") < 0) {
                        let str = ''
                        let f = files[j];
                        let ext = f.substring(f.lastIndexOf('.') + 1).toLowerCase();
                        let isPic = false;
                        if (ext == "jpg" || ext == "jpeg" || ext == "jpa" || ext == "png" || ext == "bmp" || ext == "tiff" || ext == "gif") {
                            isPic = true;
                        }
                        let fname = f.substring(f.lastIndexOf("/") + 1);
                        if (isPic) {
                            str += '<div class="file"><div><a href="./' + path + files[j] + '" target="_blank"><img src="./' + path + files[j] + '"></a></div><span>' + fname + '</span></div>';
                        } else {
                            let icon = big_exts[ext];
                            icon = icon == null ? "file256.png" : icon;
                            str += '<div class="file"><div><a href="./' + path + files[j] + '" target="_blank"><img src="../static/exts/' + icon + '"></a></div><span>' + fname + '</span></div>';
                        }
                        $("#page").append("<div class='files'>" + str + "</div>")
                    }
                }
                // let pages = rs.length/3;
                // console.log(pages)
                // for(let i=0; i<pages; i++){
                //     let css = '';
                //     if(i==0){
                //         css = 'down';
                //     }
                //     $("footer").append('<li xid="'+i+'" class="'+css+'">'+rs[i*3].value+'</li>')
                // }

                // $("footer li").on('click', function(){
                //     console.log(this)
                //     let idx = eval(this.getAttribute("xid"));
                //     $("footer li").removeClass('down')
                //     $(this).addClass('down')
                //     console.log(datas[idx*3+1], $("#page pre"))

                //     $("#page pre").jsonViewer(datas[idx*3+1]);
                // })

                // $("footer li")[0].click()
            },
            error: function (xhr, type, errorThrown) {
                alert(errorThrown);
            }
        });
    }
</script>
