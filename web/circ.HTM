
<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <title>css圆环进度条</title>
</head>
<body>
<style>
.circle_process{
	position: relative;
	width: 199px;
	height : 200px;
}
.circle_process .wrapper{
	width: 100px;
	height: 200px;
	position: absolute;
	top:0;
	overflow: hidden;
}
.circle_process .right{
	right:0;
}
.circle_process .left{
	left:0;
}
.circle_process .circle{
	width: 160px;
	height: 160px;
	border:20px solid transparent;
	border-radius: 50%;
	position: absolute;
	top:0;
	transform : rotate(-135deg);
}
.circle_process .rightcircle{
	border-top:20px solid green;
	border-right:20px solid green;
	right:0;
	-webkit-animation: circle_right 5s linear infinite;
}
.circle_process .leftcircle{
	border-bottom:20px solid green;
	border-left:20px solid green;
	left:0;
	-webkit-animation: circle_left 5s linear infinite;
}
@-webkit-keyframes circle_right{
	0%{
		-webkit-transform: rotate(-135deg);
	}
	50%,100%{
		-webkit-transform: rotate(45deg);
	}
}
@-webkit-keyframes circle_left{
	0%,50%{
		-webkit-transform: rotate(-135deg);
	}
	100%{
		-webkit-transform: rotate(45deg);
	}
}

.up {width: 100px; height: 100px; background-color:transparent;position: absolute; left: 0; top: 0; line-height: 100px; text-align: center; overflow: hidden;}
.up .step {position: absolute; left: 0; top: 50%; width: 100%; height: 100%; background-color: rgba(44, 205, 44, 0.5);}
</style>
<div class="circle_process">
    <div class="wrapper right">
      <div class="circle rightcircle"></div>
    </div>
  
    <div class="wrapper left">
      <div class="circle leftcircle" id="leftcircle"></div>
    </div>
</div>
<div style="display: block; float: left; position: relative;">
    <div class="up">
        <div class="up step"></div>
        50%
    </div>
</div>

    function showHours(oClass,num,n){
        var aEle = getByClass(oClass)[0].children,
                Rdeg = num > n ? n : num,
                Ldeg = num > n ? num - n : 0;
        aEle[2].innerHTML = "<span>"+num+"</span>";

        aEle[1].children[0].style.transform = "rotateZ("+ (360/(2*n)*Rdeg-180) +"deg)";
        aEle[0].children[0].style.transform = "rotateZ("+ (360/(2*n)*Ldeg-180) +"deg)";
    }
    function getByClass(oClass){
        return document.getElementsByClassName(oClass);
    }
</script>
